name: Autonomous Model Retraining

on:
  repository_dispatch:
    types: [trigger-retrain]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            tensorflow==2.19.0 \
            keras==3.13.2 \
            scikit-learn \
            pillow \
            numpy \
            supabase \
            joblib -q

      - name: Verify versions
        run: |
          python3 -c "import tensorflow as tf; import keras; print('TF:', tf.__version__, 'Keras:', keras.__version__)"

      - name: Run retraining job
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }}
        run: python3 scripts/retrain_job.py

      - name: Upload model artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retrain-log
          path: /tmp/retrain_log.txt
          retention-days: 7
          if-no-files-found: ignore
