name: Autonomous Model Retraining

on:
  repository_dispatch:
    types: [trigger-retrain]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-tf216
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install tensorflow==2.16.1 keras==3.3.3 \
                      scikit-learn pillow numpy \
                      supabase joblib -q

      - name: Run retraining job
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }}
        run: python3 scripts/retrain_job.py

      - name: Upload model artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retrain-log
          path: /tmp/retrain_log.txt
          retention-days: 7
